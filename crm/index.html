<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEO Skill CRM - Comprehensive Pipeline & Follow-ups</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: #0a0e1a;
            color: #e8eaed;
            line-height: 1.6;
        }

        .header {
            background: rgba(26, 31, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 20px;
            color: #00ff88;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-stats {
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: #b8babd;
        }

        .header-stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-stats .number {
            font-weight: 700;
            color: #00ff88;
        }

        .header-filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .filter-label {
            font-size: 12px;
            color: #b8babd;
        }

        .filter-select {
            padding: 6px 12px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: white;
            font-size: 13px;
        }

        .filter-select:focus {
            outline: none;
            border-color: #00ff88;
        }

        .tag-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tag-badge {
            padding: 4px 10px;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            font-size: 11px;
            color: #00ff88;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tag-badge:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        .tag-badge.active {
            background: #00ff88;
            color: #0a0e1a;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px;
        }

        .toolbar {
            background: rgba(26, 31, 46, 0.5);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: white;
            font-size: 14px;
        }

        .search-box input::placeholder {
            color: #666;
        }

        .search-box input:focus {
            outline: none;
            border-color: #00ff88;
        }

        .toolbar-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: #00ff88;
            color: #0a0e1a;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #e8eaed;
        }

        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
        }

        .view-toggle {
            display: flex;
            gap: 8px;
            background: rgba(10, 14, 26, 0.8);
            padding: 4px;
            border-radius: 6px;
        }

        .view-toggle button {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: #b8babd;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .view-toggle button.active {
            background: #00ff88;
            color: #0a0e1a;
        }

        .pipeline {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .list-view {
            display: none;
        }

        .list-view.active {
            display: block;
        }

        .list-table {
            background: rgba(26, 31, 46, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }

        .list-table table {
            width: 100%;
            border-collapse: collapse;
        }

        .list-table th {
            background: rgba(10, 14, 26, 0.8);
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            color: #00ff88;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .list-table td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }

        .list-table tr:hover {
            background: rgba(0, 255, 136, 0.05);
        }

        .stage {
            background: rgba(26, 31, 46, 0.5);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        .stage-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stage-title {
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stage-count {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .stage-body {
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }

        .contact-card {
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .contact-card:hover {
            border-color: rgba(0, 255, 136, 0.3);
            transform: translateY(-2px);
        }

        .contact-card.has-note {
            border-left: 3px solid #ff9900;
        }

        .contact-card.has-activity {
            border-right: 3px solid #0099ff;
        }

        .contact-name {
            font-weight: 600;
            margin-bottom: 4px;
            color: white;
        }

        .contact-email {
            font-size: 12px;
            color: #b8babd;
            margin-bottom: 8px;
        }

        .contact-tags {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .contact-tags .tag-badge {
            font-size: 10px;
            padding: 2px 6px;
        }

        .contact-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
        }

        .contact-date {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .contact-stats {
            display: flex;
            gap: 8px;
            font-size: 11px;
            color: #b8babd;
            margin-bottom: 8px;
        }

        .contact-stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .contact-actions {
            display: flex;
            gap: 6px;
        }

        .contact-actions button {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }

        .contact-actions button:hover {
            background: rgba(0, 255, 136, 0.2);
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1f2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content.wide {
            max-width: 1000px;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #00ff88;
        }

        .modal-close {
            background: none;
            border: none;
            color: #666;
            font-size: 24px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .modal-tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: #b8babd;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        .modal-tab.active {
            color: #00ff88;
            border-bottom-color: #00ff88;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(10, 14, 26, 0.8);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00ff88;
        }

        .contact-detail {
            background: rgba(10, 14, 26, 0.5);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .contact-detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .contact-detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .contact-detail-label {
            color: #b8babd;
            font-size: 13px;
        }

        .contact-detail-value {
            color: white;
            font-weight: 600;
            font-size: 13px;
        }

        .activity-timeline {
            position: relative;
        }

        .activity-item {
            padding-left: 30px;
            margin-bottom: 16px;
            position: relative;
        }

        .activity-item::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 8px;
            bottom: -16px;
            width: 1px;
            background: rgba(255,255,255,0.1);
        }

        .activity-item:last-child::before {
            display: none;
        }

        .activity-icon {
            position: absolute;
            left: 0;
            top: 0;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00ff88;
            color: #0a0e1a;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .activity-content {
            background: rgba(10, 14, 26, 0.5);
            padding: 12px;
            border-radius: 6px;
        }

        .activity-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .activity-type {
            font-weight: 600;
            font-size: 13px;
            color: white;
        }

        .activity-time {
            font-size: 11px;
            color: #666;
        }

        .activity-text {
            font-size: 13px;
            color: #b8babd;
        }

        .note-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .note-item {
            background: rgba(10, 14, 26, 0.5);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .note-time {
            font-size: 11px;
            color: #666;
        }

        .note-text {
            font-size: 13px;
            color: #e8eaed;
            line-height: 1.6;
        }

        .note-delete {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.2);
            color: #ff4444;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }

        .note-delete:hover {
            background: rgba(255, 68, 68, 0.2);
        }

        .modal-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #666;
            font-size: 14px;
        }

        .bulk-actions {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 12px;
        }

        .bulk-actions.active {
            display: flex;
        }

        .bulk-actions-text {
            flex: 1;
            color: #00ff88;
            font-weight: 600;
        }

        @media (max-width: 1200px) {
            .pipeline {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .pipeline {
                grid-template-columns: 1fr;
            }

            .toolbar {
                flex-direction: column;
            }

            .search-box {
                min-width: 100%;
            }

            .header-stats {
                flex-direction: column;
                gap: 8px;
            }

            .toolbar-actions {
                width: 100%;
            }

            .toolbar-actions button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <h1>📊 SEO Skill CRM</h1>
            <div class="header-stats">
                <span>📥 Total Leads: <span class="number" id="totalLeads">0</span></span>
                <span>📧 Emails Sent: <span class="number" id="totalEmails">0</span></span>
                <span>✅ Customers: <span class="number" id="totalCustomers">0</span></span>
                <span>💰 Conversion: <span class="number" id="conversionRate">0%</span></span>
            </div>
        </div>
        <div class="header-filters">
            <div class="filter-group">
                <span class="filter-label">Source:</span>
                <select class="filter-select" id="sourceFilter" onchange="applyFilters()">
                    <option value="">All Sources</option>
                    <option value="seo-skill-optin">SEO Skill Opt-in</option>
                    <option value="manual">Manual Entry</option>
                    <option value="import">Import</option>
                </select>
            </div>
            <div class="filter-group">
                <span class="filter-label">Date:</span>
                <select class="filter-select" id="dateFilter" onchange="applyFilters()">
                    <option value="">All Time</option>
                    <option value="today">Today</option>
                    <option value="week">This Week</option>
                    <option value="month">This Month</option>
                </select>
            </div>
            <div class="tag-filter" id="tagFilter">
                <!-- Tags will be populated here -->
            </div>
        </div>
    </div>

    <div class="container">
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search contacts by name, email, or tags...">
            </div>
            <div class="view-toggle">
                <button class="active" onclick="switchView('pipeline')">📋 Pipeline</button>
                <button onclick="switchView('list')">📝 List</button>
            </div>
            <div class="toolbar-actions">
                <button class="btn btn-secondary" onclick="exportToCSV()">📊 Export CSV</button>
                <button class="btn btn-secondary" onclick="refreshPipeline()">🔄 Refresh</button>
                <button class="btn btn-primary" onclick="showAddContactModal()">➕ Add Contact</button>
            </div>
        </div>

        <div class="bulk-actions" id="bulkActions">
            <span class="bulk-actions-text"><span id="selectedCount">0</span> contacts selected</span>
            <button class="btn btn-secondary" onclick="bulkEmail()">📧 Email All</button>
            <button class="btn btn-secondary" onclick="bulkTag()">🏷️ Add Tag</button>
            <button class="btn btn-secondary" onclick="bulkDelete()">🗑️ Delete</button>
            <button class="btn btn-secondary" onclick="clearSelection()">✕ Clear</button>
        </div>

        <div class="pipeline" id="pipeline">
            <!-- Pipeline stages will be rendered here -->
        </div>

        <div class="list-view" id="listView">
            <div class="list-table">
                <table>
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Stage</th>
                            <th>Tags</th>
                            <th>Source</th>
                            <th>Created</th>
                            <th>Last Activity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="listTableBody">
                        <!-- List view rows will be rendered here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Contact Detail Modal -->
    <div class="modal" id="contactModal">
        <div class="modal-content wide">
            <div class="modal-header">
                <h2 id="contactModalTitle">Contact Details</h2>
                <button class="modal-close" onclick="closeModal('contactModal')">×</button>
            </div>
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="switchTab('overview')">📋 Overview</button>
                <button class="modal-tab" onclick="switchTab('activity')">📊 Activity</button>
                <button class="modal-tab" onclick="switchTab('notes')">📝 Notes</button>
                <button class="modal-tab" onclick="switchTab('emails')">📧 Emails</button>
            </div>
            <div class="modal-body">
                <div class="tab-content active" id="overviewTab">
                    <!-- Overview content -->
                </div>
                <div class="tab-content" id="activityTab">
                    <div class="activity-timeline" id="activityTimeline">
                        <!-- Activity timeline -->
                    </div>
                </div>
                <div class="tab-content" id="notesTab">
                    <div class="form-group">
                        <label>Add Note</label>
                        <textarea id="newNoteText" placeholder="Write a note about this contact..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="addNote()" style="margin-bottom: 20px;">💾 Save Note</button>
                    <div class="note-list" id="noteList">
                        <!-- Notes will be listed here -->
                    </div>
                </div>
                <div class="tab-content" id="emailsTab">
                    <div id="emailHistory">
                        <!-- Email history -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contact Modal -->
    <div class="modal" id="addContactModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Contact</h2>
                <button class="modal-close" onclick="closeModal('addContactModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="addContactForm">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" name="phone">
                    </div>
                    <div class="form-group">
                        <label>Stage</label>
                        <select name="stage">
                            <option value="1">New Lead</option>
                            <option value="2">Contacted</option>
                            <option value="3">Engaged</option>
                            <option value="4">Customer</option>
                            <option value="5">Inactive</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Source</label>
                        <select name="source">
                            <option value="seo-skill-optin">SEO Skill Opt-in</option>
                            <option value="manual">Manual Entry</option>
                            <option value="import">Import</option>
                            <option value="referral">Referral</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tags (comma-separated)</label>
                        <input type="text" name="tags" placeholder="e.g., hot-lead, follow-up, VIP">
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea name="notes" placeholder="Add any notes about this contact..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('addContactModal')">Cancel</button>
                <button class="btn btn-primary" onclick="saveContact()">💾 Save Contact</button>
            </div>
        </div>
    </div>

    <!-- Email Modal -->
    <div class="modal" id="emailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📧 Send Email</h2>
                <button class="modal-close" onclick="closeModal('emailModal')">×</button>
            </div>
            <div class="modal-body">
                <form id="emailForm">
                    <input type="hidden" name="contactId" id="emailContactId">
                    <div class="form-group">
                        <label>To</label>
                        <input type="email" name="to" id="emailTo" readonly>
                    </div>
                    <div class="form-group">
                        <label>Template</label>
                        <select id="emailTemplate" onchange="loadTemplate()">
                            <option value="">-- Select Template --</option>
                            <option value="welcome">Welcome Email</option>
                            <option value="followup">Follow-up</option>
                            <option value="engagement">Engagement Email</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Subject *</label>
                        <input type="text" name="subject" id="emailSubject" required placeholder="Email subject line">
                    </div>
                    <div class="form-group">
                        <label>Message *</label>
                        <textarea name="message" id="emailMessage" required placeholder="Your email message..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('emailModal')">Cancel</button>
                <button class="btn btn-primary" onclick="sendEmail()">📤 Send Email</button>
            </div>
        </div>
    </div>

    <!-- Load Supabase from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="crm-advanced.js"></script>
</body>
</html>
